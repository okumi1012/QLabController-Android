name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      QLAB_RELEASE_KEYSTORE_BASE64: ${{ secrets.QLAB_RELEASE_KEYSTORE_BASE64 }}
      QLAB_RELEASE_STORE_PASSWORD: ${{ secrets.QLAB_RELEASE_STORE_PASSWORD }}
      QLAB_RELEASE_KEY_ALIAS: ${{ secrets.QLAB_RELEASE_KEY_ALIAS }}
      QLAB_RELEASE_KEY_PASSWORD: ${{ secrets.QLAB_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore release keystore
        if: ${{ env.QLAB_RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/qlab-signing"
          printf '%s' "$QLAB_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/qlab-signing/qlab-release.jks"
          echo "QLAB_RELEASE_STORE_FILE=$RUNNER_TEMP/qlab-signing/qlab-release.jks" >> "$GITHUB_ENV"

      - name: Build installable debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build signed release APK
        if: ${{ env.QLAB_RELEASE_KEYSTORE_BASE64 != '' && env.QLAB_RELEASE_STORE_PASSWORD != '' && env.QLAB_RELEASE_KEY_ALIAS != '' && env.QLAB_RELEASE_KEY_PASSWORD != '' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/qlab-controller-debug.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-artifacts/qlab-controller-release.apk
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qlab-controller-apks
          path: release-artifacts/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
