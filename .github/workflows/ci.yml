name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect package settings
        id: package
        shell: bash
        run: |
          node_version="lts/*"
          package_manager="none"

          if [ -f package.json ]; then
            node_version="$(python3 - <<'PY'
import json

with open("package.json", encoding="utf-8") as package_file:
    package = json.load(package_file)

print(package.get("engines", {}).get("node", "lts/*"))
PY
)"

            if [ -f package-lock.json ]; then
              package_manager="npm"
            elif [ -f pnpm-lock.yaml ]; then
              package_manager="pnpm"
            elif [ -f yarn.lock ]; then
              package_manager="yarn"
            else
              package_manager="npm"
            fi
          fi

          echo "node-version=$node_version" >> "$GITHUB_OUTPUT"
          echo "package-manager=$package_manager" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.package.outputs.node-version }}

      - name: Enable Corepack
        if: ${{ steps.package.outputs.package-manager == 'pnpm' || steps.package.outputs.package-manager == 'yarn' }}
        run: corepack enable

      - name: Install npm dependencies
        if: ${{ steps.package.outputs.package-manager == 'npm' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install pnpm dependencies
        if: ${{ steps.package.outputs.package-manager == 'pnpm' }}
        run: pnpm install --frozen-lockfile

      - name: Install yarn dependencies
        if: ${{ steps.package.outputs.package-manager == 'yarn' }}
        run: yarn install --frozen-lockfile

      - name: Run npm scripts
        if: ${{ steps.package.outputs.package-manager == 'npm' }}
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Run pnpm scripts
        if: ${{ steps.package.outputs.package-manager == 'pnpm' }}
        run: |
          pnpm run lint --if-present
          pnpm test --if-present
          pnpm run build --if-present

      - name: Run yarn scripts
        if: ${{ steps.package.outputs.package-manager == 'yarn' }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            yarn run lint
          fi
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            yarn test
          fi
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            yarn run build
          fi
